# Two-service stack: Postgres (pgvector) for state + retrieval, and the agent CLI.
name: retail-agent

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: retail
      POSTGRES_PASSWORD: retail
      POSTGRES_DB: retail
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retail -d retail"]
      interval: 3s
      timeout: 3s
      retries: 20

  agent:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Inside the compose network the DB host is the service name + internal port.
      DATABASE_URL: postgresql://retail:retail@postgres:5432/retail
      GOOGLE_APPLICATION_CREDENTIALS: /app/secrets/gcp.json
    volumes:
      - ./secrets:/app/secrets:ro
    stdin_open: true   # keep the REPL interactive
    tty: true

volumes:
  pgdata:
