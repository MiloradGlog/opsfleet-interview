<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Opsfleet — Design Package</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/styles/atom-one-light.min.css" />
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/languages/sql.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/languages/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/languages/yaml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/languages/json.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
<style>
  :root {
    --bg: #fafafa;
    --surface: #ffffff;
    --ink: #18181b;
    --ink-soft: #52525b;
    --rule: #e4e4e7;
    --accent: #2563eb;
    --accent-soft: #dbeafe;
    --code-bg: #f4f4f5;
    --highlight: #fff7ed;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
    color: var(--ink);
    line-height: 1.65;
  }
  .layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: 100vh;
  }
  nav.sidebar {
    background: #18181b;
    color: #f4f4f5;
    padding: 24px 16px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }
  nav h1 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #a1a1aa;
    margin: 0 0 16px 0;
    font-weight: 600;
  }
  nav ul { list-style: none; padding: 0; margin: 0; }
  nav li { margin-bottom: 4px; }
  nav button {
    width: 100%;
    text-align: left;
    background: transparent;
    color: #d4d4d8;
    border: none;
    padding: 10px 12px;
    font-size: 14px;
    cursor: pointer;
    border-radius: 6px;
    font-family: inherit;
    line-height: 1.4;
    transition: background 0.15s;
  }
  nav button:hover { background: #27272a; color: #fff; }
  nav button.active {
    background: var(--accent);
    color: #fff;
    font-weight: 500;
  }
  nav .meta {
    margin-top: 24px;
    padding-top: 16px;
    border-top: 1px solid #27272a;
    font-size: 11px;
    color: #71717a;
    line-height: 1.5;
  }
  main {
    padding: 48px 56px 96px;
    max-width: 1100px;
    margin: 0 auto;
  }
  main h1 {
    font-size: 32px;
    line-height: 1.25;
    margin: 0 0 8px;
    color: var(--ink);
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  main h2 {
    font-size: 24px;
    line-height: 1.3;
    margin-top: 48px;
    color: var(--ink);
    font-weight: 700;
    letter-spacing: -0.01em;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--rule);
  }
  main h3 {
    font-size: 18px;
    line-height: 1.35;
    margin-top: 32px;
    color: var(--ink);
    font-weight: 600;
  }
  main h4 {
    font-size: 15px;
    line-height: 1.4;
    margin-top: 24px;
    color: var(--ink-soft);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  main p { color: var(--ink); }
  main p, main li { font-size: 15px; }
  main ul, main ol { padding-left: 24px; }
  main li { margin-bottom: 6px; }
  main code:not(pre code) {
    background: var(--code-bg);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
    font-family: "SF Mono", "Menlo", monospace;
    color: #be185d;
  }
  main pre {
    background: var(--code-bg);
    padding: 16px;
    border-radius: 8px;
    overflow-x: auto;
    font-size: 13px;
    line-height: 1.5;
    border: 1px solid var(--rule);
  }
  main pre code { background: transparent; padding: 0; color: var(--ink); }
  main blockquote {
    border-left: 4px solid var(--accent);
    background: var(--accent-soft);
    padding: 12px 20px;
    margin: 24px 0;
    border-radius: 4px;
    color: var(--ink);
    font-size: 14px;
  }
  main blockquote p:first-child { margin-top: 0; }
  main blockquote p:last-child { margin-bottom: 0; }
  main table {
    border-collapse: collapse;
    margin: 24px 0;
    width: 100%;
    font-size: 14px;
    background: var(--surface);
    box-shadow: 0 0 0 1px var(--rule);
    border-radius: 6px;
    overflow: hidden;
  }
  main th {
    background: #f4f4f5;
    color: var(--ink);
    font-weight: 600;
    text-align: left;
    padding: 10px 14px;
    border-bottom: 1px solid var(--rule);
  }
  main td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--rule);
    vertical-align: top;
  }
  main tr:last-child td { border-bottom: none; }
  main hr {
    border: none;
    border-top: 1px solid var(--rule);
    margin: 32px 0;
  }
  main a { color: var(--accent); text-decoration: none; }
  main a:hover { text-decoration: underline; }
  .mermaid {
    background: var(--surface);
    padding: 16px;
    border-radius: 8px;
    border: 1px solid var(--rule);
    margin: 24px 0;
    text-align: center;
    overflow-x: auto;
    position: relative;
    cursor: zoom-in;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .mermaid:hover {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .mermaid::after {
    content: "⤢ expand";
    position: absolute;
    top: 8px;
    right: 8px;
    background: var(--ink);
    color: white;
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 4px;
    font-family: -apple-system, sans-serif;
    opacity: 0;
    transition: opacity 0.15s;
    pointer-events: none;
  }
  .mermaid:hover::after { opacity: 0.85; }
  .diagram-modal {
    position: fixed;
    inset: 0;
    background: #0f0f12;
    z-index: 1000;
    display: none;
    flex-direction: column;
    animation: fadeIn 0.15s ease-out;
  }
  body.modal-open { overflow: hidden; }
  .diagram-modal.open { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .diagram-modal__bar {
    padding: 12px 20px;
    background: rgba(0, 0, 0, 0.4);
    color: #d4d4d8;
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 13px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  }
  .diagram-modal__bar .hint {
    color: #71717a;
    margin-left: auto;
  }
  .diagram-modal__bar button {
    background: rgba(255, 255, 255, 0.08);
    color: #fafafa;
    border: 1px solid rgba(255, 255, 255, 0.12);
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
  }
  .diagram-modal__bar button:hover { background: rgba(255, 255, 255, 0.16); }
  .diagram-modal__close { font-size: 18px; line-height: 1; padding: 0 10px !important; }
  .diagram-modal__stage {
    flex: 1;
    overflow: hidden;
    background: #fafafa;
    cursor: grab;
    position: relative;
  }
  .diagram-modal__stage:active { cursor: grabbing; }
  .diagram-modal__stage svg {
    width: 100%;
    height: 100%;
    display: block;
  }
  .loading {
    color: var(--ink-soft);
    padding: 80px;
    text-align: center;
    font-size: 14px;
  }
  .file-badge {
    display: inline-block;
    background: var(--accent-soft);
    color: var(--accent);
    padding: 2px 10px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 16px;
    font-family: "SF Mono", "Menlo", monospace;
  }
</style>
</head>
<body>
<div class="layout">
  <nav class="sidebar">
    <h1>Design Package</h1>
    <ul id="doclist">
      <li><button data-file="01_Project_Vision.md" class="active">01 · Project Vision</button></li>
      <li><button data-file="02_Requirements.md">02 · Requirements</button></li>
      <li><button data-file="03_Use_Case_Diagrams.md">03 · Use Case Diagrams</button></li>
      <li><button data-file="04_System_Design.md">04 · System Design</button></li>
    </ul>
    <div class="meta">
      <strong>AI Data Analysis Chat Assistant</strong><br/>
      Retail Company internal HLD package.<br/><br/>
      Vision → Requirements → Use Cases → System Design.
    </div>
  </nav>
  <main id="content">
    <div class="loading">Loading…</div>
  </main>
</div>

<div class="diagram-modal" id="diagramModal" role="dialog" aria-modal="true" aria-label="Diagram viewer">
  <div class="diagram-modal__bar">
    <button id="modalReset" title="Reset view (0)">Reset</button>
    <button id="modalZoomOut" title="Zoom out (−)">−</button>
    <button id="modalZoomIn" title="Zoom in (+)">+</button>
    <span class="hint">scroll to zoom · drag to pan · Esc to close</span>
    <button class="diagram-modal__close" id="modalClose" title="Close (Esc)" aria-label="Close">×</button>
  </div>
  <div class="diagram-modal__stage" id="modalStage"></div>
</div>

<script>
mermaid.initialize({
  startOnLoad: false,
  theme: 'neutral',
  themeVariables: {
    fontFamily: '-apple-system, BlinkMacSystemFont, system-ui, sans-serif',
    fontSize: '14px',
    primaryColor: '#dbeafe',
    primaryTextColor: '#18181b',
    primaryBorderColor: '#2563eb',
    lineColor: '#52525b',
    secondaryColor: '#f4f4f5',
    tertiaryColor: '#ffffff'
  },
  flowchart: { curve: 'basis', useMaxWidth: true },
  sequence: { useMaxWidth: true },
});

const renderer = new marked.Renderer();
const originalCode = renderer.code.bind(renderer);
renderer.code = function(code, infostring, escaped) {
  if (infostring === 'mermaid') {
    return `<div class="mermaid">${code}</div>`;
  }
  return originalCode(code, infostring, escaped);
};

marked.setOptions({
  renderer,
  highlight: function(code, lang) {
    if (lang && hljs.getLanguage(lang)) {
      try { return hljs.highlight(code, { language: lang }).value; } catch (e) {}
    }
    return hljs.highlightAuto(code).value;
  },
  gfm: true,
  breaks: false,
});

const buttons = document.querySelectorAll('nav button');
const content = document.getElementById('content');

// Modal state for fullscreen diagram view
const modal = document.getElementById('diagramModal');
const modalStage = document.getElementById('modalStage');
let panZoomInstance = null;

function openDiagram(svgElement) {
  if (!svgElement) return;
  modalStage.innerHTML = '';
  const clone = svgElement.cloneNode(true);
  clone.removeAttribute('style');
  clone.setAttribute('width', '100%');
  clone.setAttribute('height', '100%');
  modalStage.appendChild(clone);
  modal.classList.add('open');
  document.body.classList.add('modal-open');
  // Defer pan-zoom init so the SVG is laid out
  requestAnimationFrame(() => {
    try {
      panZoomInstance = svgPanZoom(clone, {
        zoomEnabled: true,
        controlIconsEnabled: false,
        fit: true,
        center: true,
        minZoom: 0.2,
        maxZoom: 12,
        zoomScaleSensitivity: 0.4,
      });
    } catch (e) { panZoomInstance = null; }
  });
}

function closeDiagram() {
  modal.classList.remove('open');
  document.body.classList.remove('modal-open');
  if (panZoomInstance) { try { panZoomInstance.destroy(); } catch (e) {} panZoomInstance = null; }
  modalStage.innerHTML = '';
}

document.getElementById('modalClose').addEventListener('click', closeDiagram);
document.getElementById('modalZoomIn').addEventListener('click', () => panZoomInstance && panZoomInstance.zoomIn());
document.getElementById('modalZoomOut').addEventListener('click', () => panZoomInstance && panZoomInstance.zoomOut());
document.getElementById('modalReset').addEventListener('click', () => panZoomInstance && (panZoomInstance.resetZoom(), panZoomInstance.center(), panZoomInstance.fit()));
modal.addEventListener('click', (e) => { if (e.target === modal) closeDiagram(); });
document.addEventListener('keydown', (e) => {
  if (!modal.classList.contains('open')) return;
  if (e.key === 'Escape') closeDiagram();
  if (e.key === '+' || e.key === '=') panZoomInstance && panZoomInstance.zoomIn();
  if (e.key === '-' || e.key === '_') panZoomInstance && panZoomInstance.zoomOut();
  if (e.key === '0') panZoomInstance && (panZoomInstance.resetZoom(), panZoomInstance.center(), panZoomInstance.fit());
});

async function loadDoc(file) {
  buttons.forEach(b => b.classList.toggle('active', b.dataset.file === file));
  content.innerHTML = '<div class="loading">Loading ' + file + '…</div>';
  let md;
  try {
    const res = await fetch('../design/' + file + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    md = await res.text();
  } catch (err) {
    content.innerHTML = '<p style="color:#dc2626;">Failed to load ' + file + ': ' + err.message + '</p>';
    return;
  }
  content.innerHTML =
    '<div class="file-badge">' + file + '</div>' +
    marked.parse(md);
  // Render each mermaid block in isolation so one bad block can't blank the page
  const blocks = content.querySelectorAll('.mermaid');
  for (let i = 0; i < blocks.length; i++) {
    const node = blocks[i];
    try {
      await mermaid.run({ nodes: [node] });
      // Wire click-to-expand on successfully rendered diagrams
      node.addEventListener('click', () => {
        const svg = node.querySelector('svg');
        if (svg) openDiagram(svg);
      });
    } catch (err) {
      const src = node.textContent;
      node.style.cursor = 'default';
      node.innerHTML =
        '<div style="background:#fef2f2;color:#991b1b;padding:12px;border-radius:6px;font-size:12px;">' +
        '<strong>Mermaid render error in this block:</strong> ' + (err && err.message ? err.message : 'unknown') +
        '<details style="margin-top:8px;"><summary style="cursor:pointer;">Show source</summary>' +
        '<pre style="background:#fff;color:#444;padding:8px;border-radius:4px;margin-top:6px;overflow-x:auto;">' +
        src.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') +
        '</pre></details></div>';
    }
  }
  window.scrollTo(0, 0);
}

buttons.forEach(b => b.addEventListener('click', () => loadDoc(b.dataset.file)));
loadDoc('01_Project_Vision.md');
</script>
</body>
</html>
